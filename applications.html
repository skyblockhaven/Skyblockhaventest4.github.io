<section class="hero">
    <h1>📝 Staff Applications</h1>
    <p>Want to help the SkyBlockHaven community? Apply to join our staff team!</p>
</section>

<section class="features">

    <div class="card" style="max-width:700px;margin:auto;width:100%;">

        <h2>Application Form</h2>

        <form>

            <label>Minecraft Username</label><br>
            <input type="text" placeholder="Your username" required>

            <br><br>

            <label>Discord Username</label><br>
            <input type="text" placeholder="username#0000" required>

            <br><br>

            <label>Age</label><br>
            <input type="number" min="13" placeholder="Your age" required>

            <br><br>

            <label>Position</label><br>
            <select required>
                <option>Helper</option>
                <option>Moderator</option>
                <option>Builder</option>
            </select>

            <br><br>

            <label>Why should we choose you?</label><br>
            <textarea rows="6" placeholder="Tell us about yourself..." required></textarea>

            <br><br>

            <button class="button" type="submit">
                Submit Application
            </button>

        </form>

    </div>

</section>
